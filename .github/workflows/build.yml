name: Build launcher.jar

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # The project was developed against Java 8 (Eclipse + commons-codec 1.10 era).
      # Temurin 8 is the best freely available LTS distribution for that vintage.
      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      # ── Dependencies ────────────────────────────────────────────────────────
      # commons-codec-1.10 is referenced in .classpath; pull it from Maven Central.
      - name: Download commons-codec-1.10.jar
        run: |
          mkdir -p lib
          curl -fsSL \
            "https://repo1.maven.org/maven2/commons-codec/commons-codec/1.10/commons-codec-1.10.jar" \
            -o lib/commons-codec-1.10.jar

      # org.jar is the org.json library, widely used by Minecraft launchers of this era
      # to parse Mojang's JSON responses. We download it from Maven Central.
      - name: Download org.json (org.jar)
        run: |
          curl -fsSL \
            "https://repo1.maven.org/maven2/org/json/json/20140107/json-20140107.jar" \
            -o lib/org.jar

      # ── Compile ─────────────────────────────────────────────────────────────
      - name: Compile Java sources
        run: |
          mkdir -p build/classes
          # Collect every .java file under the repo root recursively
          find . -name "*.java" \
                 -not -path "./.git/*" \
            > sources.txt
          echo "=== Sources found ==="
          cat sources.txt
          javac \
            -source 8 -target 8 \
            -encoding UTF-8 \
            -cp "lib/commons-codec-1.10.jar:lib/org.jar" \
            -d build/classes \
            @sources.txt

      # ── Package ─────────────────────────────────────────────────────────────
      # Detect the main class automatically: look for the class that contains
      # "public static void main".  Falls back to wdes.fr.Launcher if ambiguous.
      - name: Detect main class
        id: mainclass
        run: |
          MAIN=$(grep -rl "public static void main" . \
                   --include="*.java" \
                   -l \
                 | head -1 \
                 | sed 's|^\./||; s|\.java$||; s|/|.|g')
          if [ -z "$MAIN" ]; then
            MAIN="wdes.fr.Launcher"
            echo "::warning::Could not detect main class; defaulting to $MAIN"
          fi
          echo "Detected main class: $MAIN"
          echo "main=$MAIN" >> "$GITHUB_OUTPUT"

      - name: Build launcher.jar
        run: |
          # Write the manifest
          cat > build/MANIFEST.MF <<EOF
          Manifest-Version: 1.0
          Main-Class: ${{ steps.mainclass.outputs.main }}
          Class-Path: commons-codec-1.10.jar org.jar
          EOF

          # Copy runtime dependencies next to the JAR so the Class-Path is honoured
          cp lib/commons-codec-1.10.jar build/
          cp lib/org.jar               build/

          jar cfm build/launcher.jar build/MANIFEST.MF \
            -C build/classes .

          echo "=== JAR contents ==="
          jar tf build/launcher.jar | head -40

      # ── Artifact ────────────────────────────────────────────────────────────
      - name: Upload launcher.jar
        uses: actions/upload-artifact@v7
        with:
          name: launcher-jar
          # Upload the full build/ folder so the runtime deps travel with the JAR
          path: |
            build/launcher.jar
#            build/commons-codec-1.10.jar
#            build/org.jar
          retention-days: 30
          archive: false
