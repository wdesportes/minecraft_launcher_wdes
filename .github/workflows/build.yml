name: Build launcher.jar

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"

      - name: Download commons-codec-1.10.jar
        run: |
          mkdir -p lib
          curl -fsSL \
            "https://repo1.maven.org/maven2/commons-codec/commons-codec/1.10/commons-codec-1.10.jar" \
            -o lib/commons-codec-1.10.jar

      # org.jar is org.json — confirmed by the NoClassDefFoundError at runtime.
      - name: Download org.json (org.jar)
        run: |
          curl -fsSL \
            "https://repo1.maven.org/maven2/org/json/json/20140107/json-20140107.jar" \
            -o lib/org.jar

      - name: Compile Java sources
        run: |
          mkdir -p build/classes
          find . -name "*.java" -not -path "./.git/*" > sources.txt
          echo "=== Sources found ==="
          cat sources.txt
          javac \
            -source 8 -target 8 \
            -encoding UTF-8 \
            -cp "lib/commons-codec-1.10.jar:lib/org.jar" \
            -d build/classes \
            @sources.txt

      # Eclipse automatically copies non-.java files into the output directory.
      # The repo also contains committed .class files — we must exclude them so
      # they don't overwrite the freshly compiled ones in build/classes.
      - name: Copy resources
        run: |
          find . -type f \
            -not -name "*.java" \
            -not -name "*.class" \
            -not -path "./.git/*" \
            -not -path "./lib/*" \
            -not -path "./build/*" \
            -not -path "./.classpath" \
            -not -path "./.project" \
          | while read f; do
              dest="build/classes/${f#./}"
              mkdir -p "$(dirname "$dest")"
              cp "$f" "$dest"
            done
          echo "=== Resources copied ==="
          find build/classes -not -name "*.class" -type f

      - name: Detect main class
        id: mainclass
        run: |
          MAIN=$(grep -rl "public static void main" . \
                   --include="*.java" \
                 | head -1 \
                 | sed 's|^\./||; s|\.java$||; s|/|.|g')
          if [ -z "$MAIN" ]; then
            MAIN="wdes.fr.Main"
            echo "::warning::Could not detect main class; defaulting to $MAIN"
          fi
          echo "Detected main class: $MAIN"
          echo "main=$MAIN" >> "$GITHUB_OUTPUT"

      - name: Build fat launcher.jar
        run: |
          # Unpack dependencies so the JAR is fully self-contained (replicates
          # Eclipse's "Export → Runnable JAR → Extract required libraries").
          cd build/classes
          jar xf ../../lib/commons-codec-1.10.jar
          jar xf ../../lib/org.jar
          rm -rf META-INF/MANIFEST.MF META-INF/*.SF META-INF/*.DSA META-INF/*.RSA
          cd ../..

          printf "Manifest-Version: 1.0\nMain-Class: ${{ steps.mainclass.outputs.main }}\n" \
            > build/MANIFEST.MF

          jar cfm build/launcher.jar build/MANIFEST.MF -C build/classes .

          echo "=== JAR contents ==="
          jar tf build/launcher.jar | head -60

      - name: Upload launcher.jar
        uses: actions/upload-artifact@v7
        with:
          name: launcher-jar
          path: build/launcher.jar
          retention-days: 30
          archive: false
