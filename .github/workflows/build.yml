name: Build launcher.jar

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # pom.xml targets Java 8-era dependencies; Temurin 8 is the safest match.
      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      # guava:r05 is a pre-Maven-Central artifact not hosted on Central.
      # We install it manually into the local repo so Maven can resolve it.
      - name: Install guava r05 into local Maven repo
        run: |
          curl -fsSL \
            "https://repo1.maven.org/maven2/com/google/guava/guava/r05/guava-r05.jar" \
            -o guava-r05.jar
          mvn install:install-file \
            -Dfile=guava-r05.jar \
            -DgroupId=com.google.guava \
            -DartifactId=guava \
            -Dversion=r05 \
            -Dpackaging=jar \
            -q

      # maven-assembly-plugin is bound to the package phase and produces
      # target/wdes-launcher-1.0.1-jar-with-dependencies.jar
      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress package

      - name: Rename artifact
        run: |
          mv target/wdes-launcher-*-jar-with-dependencies.jar target/launcher.jar

      - name: Upload launcher.jar
        uses: actions/upload-artifact@v7
        with:
          name: launcher-jar
          path: target/launcher.jar
          retention-days: 30
          archive: false
